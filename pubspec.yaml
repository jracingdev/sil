name: rhm_coletor
description: S.I.L. — Sistema Integrado Logístico para coleta e separação Winthor/RHM.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.4
  provider: ^6.1.5
  mobile_scanner: ^7.2.0
  http: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  shelf: ^1.4.2
  sil_api:
    path: api

flutter:
  uses-material-design: true
  assets:
    - assets/sil_logo.png
