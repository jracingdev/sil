name: rhm_coletor
description: S.I.L. — Sistema Integrado Logístico para coleta e separação Winthor/RHM.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.4
  provider: ^6.1.5
  mobile_scanner: ^7.2.0
  http: ^1.4.0
  audioplayers: ^6.4.0
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  shelf: ^1.4.2
  sil_api:
    path: api

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: assets/branding/app_icon_background.png
  adaptive_icon_foreground: assets/branding/app_icon_foreground.png
  adaptive_icon_monochrome: assets/branding/app_icon_foreground.png

flutter:
  uses-material-design: true
  assets:
    - assets/sil_logo.png
    - assets/sounds/beep_endereco.wav
    - assets/sounds/beep_scan.wav
    - assets/sounds/beep_sucesso.wav
